name: Real Data Cache Validation

on:
  workflow_dispatch:

jobs:
  validate-real-data-cache:
    runs-on:
      - self-hosted
    env:
      RAW_DATA_ROOT: ${{ vars.MINE_PILE_VIZ_RAW_DATA_ROOT }}
      APP_CACHE_ROOT: ${{ github.workspace }}/.local/app-data/v1
      REFERENCE_ROOT: ${{ vars.MINE_PILE_VIZ_REFERENCE_ROOT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate configured raw-data root
        shell: pwsh
        run: |
          if (-not $env:RAW_DATA_ROOT) {
            throw "Repository variable MINE_PILE_VIZ_RAW_DATA_ROOT is required for the real-data cache workflow."
          }

          if (-not (Test-Path $env:RAW_DATA_ROOT)) {
            throw "Configured RAW_DATA_ROOT was not found on the self-hosted runner: $env:RAW_DATA_ROOT"
          }

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r scripts/generate_actual_cache.requirements.txt

      - name: Rebuild and validate the real-data cache
        run: pnpm validate:real-data
